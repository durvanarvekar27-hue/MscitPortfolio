<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UrbanWear Clothing Store</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f4f4f4;
      color:#333;
    }

    header{
      background:#111;
      color:white;
      padding:20px 50px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    header h1{
      font-size:32px;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin-left:20px;
      transition:0.3s;
    }

    nav a:hover{
      color:#ff9800;
    }

    .hero{
      height:90vh;
      background:url('https://images.unsplash.com/photo-1523381210434-271e8be1f52b?q=80&w=1400&auto=format&fit=crop') center/cover;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      color:white;
    }

    .hero-content{
      background:rgba(0,0,0,0.5);
      padding:40px;
      border-radius:10px;
    }

    .hero h2{
      font-size:50px;
      margin-bottom:15px;
    }

    .hero p{
      font-size:20px;
      margin-bottom:20px;
    }

    .btn{
      display:inline-block;
      padding:12px 25px;
      background:#ff9800;
      color:white;
      text-decoration:none;
      border-radius:5px;
      transition:0.3s;
    }

    .btn:hover{
      background:#e68900;
    }

    .products{
      padding:60px 50px;
    }

    .products h2{
      text-align:center;
      margin-bottom:40px;
      font-size:40px;
    }

    .product-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
      gap:25px;
    }

    .product-card{
      background:white;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      transition:0.3s;
    }

    .product-card:hover{
      transform:translateY(-5px);
    }

    .product-card img{
      width:100%;
      height:300px;
      object-fit:cover;
    }

    .product-info{
      padding:20px;
      text-align:center;
    }

    .product-info h3{
      margin-bottom:10px;
    }

    .price{
      color:#ff9800;
      font-size:20px;
      margin-bottom:15px;
    }

    footer{
      background:#111;
      color:white;
      text-align:center;
      padding:20px;
      margin-top:40px;
    }

    @media(max-width:768px){
      header{
        flex-direction:column;
      }

      nav{
        margin-top:10px;
      }

      .hero h2{
        font-size:36px;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <h1>UrbanWear</h1>

    <nav>
      <a href="#">Home</a>
      <a href="#">Shop</a>
      <a href="#">Men</a>
      <a href="#">Women</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h2>New Fashion Collection 2026</h2>
      <p>Trendy styles for every season</p>
      <a href="#" class="btn">Shop Now</a>
    </div>
  </section>

  <!-- Products -->
  <section class="products">
    <h2>Featured Products</h2>

    <div class="product-grid">

      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=800&auto=format&fit=crop" alt="T-Shirt">
        <div class="product-info">
          <h3>Classic T-Shirt</h3>
          <p class="price">$29</p>
          <a href="#" class="btn">Buy Now</a>
        </div>
      </div>

      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246?q=80&w=800&auto=format&fit=crop" alt="Hoodie">
        <div class="product-info">
          <h3>Street Hoodie</h3>
          <p class="price">$49</p>
          <a href="#" class="btn">Buy Now</a>
        </div>
      </div>

      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?q=80&w=800&auto=format&fit=crop" alt="Jacket">
        <div class="product-info">
          <h3>Winter Jacket</h3>
          <p class="price">$89</p>
          <a href="#" class="btn">Buy Now</a>
        </div>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 UrbanWear. All Rights Reserved.</p>
  </footer>

</body>
</html>
