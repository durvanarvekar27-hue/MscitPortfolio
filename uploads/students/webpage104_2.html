<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magic Toy Store</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f5f7ff;
      color:#333;
    }

    header{
      background:linear-gradient(90deg,#ff6b6b,#ffb347);
      padding:20px;
      color:white;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
    }

    header h1{
      font-size:35px;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin:10px;
      font-size:18px;
      font-weight:bold;
    }

    .hero{
      height:90vh;
      background:url('https://images.unsplash.com/photo-1558060370-d644479cb6f7?q=80&w=1600&auto=format&fit=crop') center/cover;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      color:white;
      padding:20px;
    }

    .hero-content{
      background:rgba(0,0,0,0.5);
      padding:40px;
      border-radius:20px;
    }

    .hero h2{
      font-size:55px;
      margin-bottom:20px;
    }

    .hero p{
      font-size:22px;
      margin-bottom:25px;
    }

    .btn{
      background:#ff6b6b;
      padding:15px 30px;
      color:white;
      border:none;
      border-radius:10px;
      font-size:20px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:#ff3b3b;
      transform:scale(1.05);
    }

    .section-title{
      text-align:center;
      margin:50px 0 20px;
      font-size:40px;
      color:#444;
    }

    .products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:30px;
      padding:40px;
    }

    .card{
      background:white;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-10px);
    }

    .card img{
      width:100%;
      height:250px;
      object-fit:cover;
    }

    .card-content{
      padding:20px;
      text-align:center;
    }

    .card h3{
      margin-bottom:10px;
      font-size:28px;
    }

    .price{
      color:#ff6b6b;
      font-size:24px;
      margin-bottom:15px;
    }

    footer{
      background:#222;
      color:white;
      text-align:center;
      padding:20px;
      margin-top:50px;
    }

    @media(max-width:768px){
      .hero h2{
        font-size:38px;
      }

      .hero p{
        font-size:18px;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>🧸 Magic Toy Store</h1>

  <nav>
    <a href="#">Home</a>
    <a href="#">Toys</a>
    <a href="#">Offers</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <h2>Best Toys For Happy Kids</h2>
    <p>Discover amazing toys, teddy bears, robots, cars and more!</p>
    <button class="btn" onclick="shopNow()">Shop Now</button>
  </div>
</section>

<h2 class="section-title">Popular Toys</h2>

<section class="products">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1566576912321-d58ddd7a6088?q=80&w=800&auto=format&fit=crop" alt="Teddy Bear">

    <div class="card-content">
      <h3>Teddy Bear</h3>
      <p class="price">$25</p>
      <button class="btn">Buy Now</button>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1515488042361-ee00e0ddd4e4?q=80&w=800&auto=format&fit=crop" alt="Toy Car">

    <div class="card-content">
      <h3>Racing Car</h3>
      <p class="price">$18</p>
      <button class="btn">Buy Now</button>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1587654780291-39c9404d746b?q=80&w=800&auto=format&fit=crop" alt="Robot Toy">

    <div class="card-content">
      <h3>Robot Toy</h3>
      <p class="price">$40</p>
      <button class="btn">Buy Now</button>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1608889825271-969628058c8f?q=80&w=800&auto=format&fit=crop" alt="Building Blocks">

    <div class="card-content">
      <h3>Building Blocks</h3>
      <p class="price">$30</p>
      <button class="btn">Buy Now</button>
    </div>
  </div>

</section>

<footer>
  <p>© 2026 Magic Toy Store | Made with ❤️</p>
</footer>

<script>
  function shopNow(){
    alert("Welcome to Magic Toy Store 🧸");
  }
</script>

</body>
</html>
